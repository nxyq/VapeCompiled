name: Replace 7GrandDadPGN → nxyq

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# REQUIRED: allow push back to repo
permissions:
  contents: write

jobs:
  replace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Replace text safely
        run: |
          echo "Searching and replacing..."

          # Only process text files (avoids breaking binaries)
          files=$(grep -rl "7GrandDadPGN" . || true)

          if [ -z "$files" ]; then
            echo "No matches found."
            exit 0
          fi

          for file in $files; do
            # skip git + binary-heavy folders
            if [[ "$file" == *.png || "$file" == *.jpg || "$file" == *.zip ]]; then
              continue
            fi

            sed -i 's/7GrandDadPGN/nxyq/g' "$file"
          done

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "Auto-replace 7GrandDadPGN → nxyq"

      - name: Push changes (safe)
        run: |
          git push origin HEAD:main
